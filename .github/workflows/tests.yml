name: Tests

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: 8.2
            laravel: 10
            testbench: 8
          - php: 8.3
            laravel: 10
            testbench: 8
          - php: 8.3
            laravel: 11
            testbench: 9
          - php: 8.4
            laravel: 11
            testbench: 9
          - php: 8.3
            laravel: 12
            testbench: 10
          - php: 8.4
            laravel: 12
            testbench: 10

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "illuminate/support:^${{ matrix.laravel }}.0" \
            "illuminate/http:^${{ matrix.laravel }}.0" \
            "illuminate/filesystem:^${{ matrix.laravel }}.0" \
            --no-interaction --no-update
          composer require --dev \
            "orchestra/testbench:^${{ matrix.testbench }}.0" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress --no-audit --ignore-platform-reqs

      - name: Run tests
        run: vendor/bin/pest --ci
